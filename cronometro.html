<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronometro</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:#0a0a0f;
    --panel:#12121a;
    --border:#1e1e2e;
    --green:#00ff87;
    --red:#ff3c5e;
    --text:#c8c8e0;
    --muted:#5a5a7a;
    --mono:'Share Tech Mono', monospace;
    --sans:'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .label {
    font-size: .7rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.2rem;
  }

  .face {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 1.6rem;
    padding: 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    width: min(88vw, 400px);
  }

  .display {
    font-family: var(--mono);
    font-size: clamp(3rem, 14vw, 5rem);
    color: var(--green);
    line-height: 1;
    transition: opacity .2s ease;
  }

  .display.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* 🔥 BOTTONE GRANDE */
  .btn-main {
    width: 100%;
    padding: 1.2rem;
    border-radius: 1rem;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    cursor: pointer;
    background: var(--green);
    color: #000;
    transition: transform .1s, background .2s;
  }

  .btn-main:active {
    transform: scale(0.97);
  }

  .btn-main.stop {
    background: var(--red);
    color: #fff;
  }

  .controls {
    display: flex;
    gap: 1rem;
    width: 100%;
  }

  .btn {
    flex: 1;
    padding: .8rem;
    border-radius: .8rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-family: var(--sans);
  }

</style>
</head>

<body>

<p class="label">⏱ Cronometro</p>

<div class="face">

  <div class="display" id="display">00:00.00</div>

  <!-- 🔥 UNICO BOTTONE START / STOP -->
  <button id="btn-main" class="btn-main">START</button>

  <div class="controls">
    <button class="btn" id="btn-reset">Reset</button>
    <button class="btn" id="btn-hide">Hide</button>
  </div>

</div>

<script>
let startTime = 0;
let elapsed = 0;
let running = false;
let raf;

const display = document.getElementById("display");
const btnMain = document.getElementById("btn-main");
const btnReset = document.getElementById("btn-reset");
const btnHide = document.getElementById("btn-hide");

/* AUDIO */
let audioCtx;

function getAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function beep(f1,f2){
  const ctx = getAudio();
  const now = ctx.currentTime;

  function tone(f,o){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type="square";
    osc.frequency.value=f;

    gain.gain.setValueAtTime(0.0001, now+o);
    gain.gain.exponentialRampToValueAtTime(0.3, now+o+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+o+0.12);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(now+o);
    osc.stop(now+o+0.2);
  }

  tone(f1,0);
  tone(f2,0.12);
}

/* TIMER */
function format(ms){
  const cs=Math.floor(ms/10)%100;
  const s=Math.floor(ms/1000)%60;
  const m=Math.floor(ms/60000);
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(cs).padStart(2,"0")}`;
}

function tick(){
  if(!running) return;
  const now = performance.now();
  display.textContent = format(elapsed + (now - startTime));
  raf = requestAnimationFrame(tick);
}

/* 🔥 TOGGLE START / STOP */
btnMain.onclick = () => {

  getAudio().resume?.();

  if(!running){
    // START
    beep(660,880);

    running = true;
    startTime = performance.now();
    raf = requestAnimationFrame(tick);

    btnMain.textContent = "STOP";
    btnMain.classList.add("stop");

  } else {
    // STOP
    beep(880,550);

    running = false;
    elapsed += performance.now() - startTime;
    cancelAnimationFrame(raf);

    btnMain.textContent = "START";
    btnMain.classList.remove("stop");
  }
};

/* RESET */
btnReset.onclick = () => {
  running = false;
  elapsed = 0;
  display.textContent = "00:00.00";
  cancelAnimationFrame(raf);

  btnMain.textContent = "START";
  btnMain.classList.remove("stop");
};

/* HIDE */
btnHide.onclick = () => {
  display.classList.toggle("hidden");
};
</script>

</body>
</html>
