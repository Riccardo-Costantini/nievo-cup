<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronometro FIX</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    color:white;
    font-family:Arial;
}
#display{
    font-size:4rem;
    font-family:monospace;
    margin-bottom:20px;
}
button{
    padding:15px 25px;
    margin:5px;
    font-size:1.1rem;
}
</style>
</head>

<body>

<div style="text-align:center">
    <div id="display">00:00.00</div>
    <button onclick="unlockAudio()">🔊 ATTIVA SUONO</button>
    <button onclick="startTimer()">START</button>
    <button onclick="stopTimer()">STOP</button>
</div>

<script>
let ctx;
let unlocked = false;

let running = false;
let startTime = 0;
let elapsed = 0;
let interval;

function unlockAudio(){
    if(unlocked) return;

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    unlocked = true;

    beep(800, 100);
}

function beep(freq, duration){
    if(!ctx) return;

    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.connect(g);
    g.connect(ctx.destination);

    o.frequency.value = freq;
    o.type = "sine";

    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration/1000);

    o.start();
    o.stop(ctx.currentTime + duration/1000);
}

function update(){
    let t = Date.now() - startTime + elapsed;

    let m = Math.floor(t/60000);
    let s = Math.floor((t%60000)/1000);
    let cs = Math.floor((t%1000)/10);

    document.getElementById("display").textContent =
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

function startTimer(){
    if(running) return;
    if(!unlocked) return alert("Premi prima ATTIVA SUONO");

    beep(1000,120);

    running = true;
    startTime = Date.now();
    interval = setInterval(update, 10);
}

function stopTimer(){
    if(!running) return;

    running = false;
    clearInterval(interval);
    elapsed += Date.now() - startTime;

    beep(500,200);
}
</script>

</body>
</html>
