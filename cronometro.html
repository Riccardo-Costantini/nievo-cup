<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronometro</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:#0a0a0f;
    --panel:#12121a;
    --border:#1e1e2e;
    --green:#00ff87;
    --red:#ff3c5e;
    --text:#c8c8e0;
    --muted:#5a5a7a;
    --mono:'Share Tech Mono', monospace;
    --sans:'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .label {
    font-size: .7rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.2rem;
  }

  .face {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 1.6rem;
    padding: 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    width: min(88vw, 400px);
  }

  .display {
    font-family: var(--mono);
    font-size: clamp(3rem, 14vw, 5rem);
    color: var(--green);
    transition: opacity .2s;
  }

  .display.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .controls {
    display: flex;
    gap: 1rem;
    width: 100%;
  }

  button {
    flex: 1;
    padding: .8rem;
    border-radius: .8rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }

  .btn-start { background: var(--green); color:#000; }
  .btn-stop { color: var(--red); border-color: var(--red); }

</style>
</head>

<body>

<p class="label">⏱ Cronometro</p>

<div class="face">

  <div class="display" id="display">00:00.00</div>

  <div class="controls">
    <button id="btn-start" class="btn-start">Start</button>
    <button id="btn-stop" class="btn-stop" disabled>Stop</button>
    <button id="btn-hide">Hide</button>
  </div>

</div>

<script>
let startTime = 0;
let elapsed = 0;
let running = false;
let raf;

const display = document.getElementById("display");
const btnStart = document.getElementById("btn-start");
const btnStop = document.getElementById("btn-stop");
const btnHide = document.getElementById("btn-hide");

function format(ms){
  const cs = Math.floor(ms/10)%100;
  const s = Math.floor(ms/1000)%60;
  const m = Math.floor(ms/60000);
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(cs).padStart(2,"0")}`;
}

function tick(){
  if(!running) return;
  const now = performance.now();
  display.textContent = format(elapsed + (now - startTime));
  raf = requestAnimationFrame(tick);
}

btnStart.onclick = () => {
  if(running) return;
  running = true;
  startTime = performance.now();
  raf = requestAnimationFrame(tick);
  btnStart.disabled = true;
  btnStop.disabled = false;
};

btnStop.onclick = () => {
  if(!running) return;
  running = false;
  elapsed += performance.now() - startTime;
  cancelAnimationFrame(raf);
  btnStart.disabled = false;
  btnStop.disabled = true;
};

btnHide.onclick = () => {
  display.classList.toggle("hidden");
  btnHide.textContent = display.classList.contains("hidden")
    ? "Show"
    : "Hide";
};
</script>

</body>
</html>
