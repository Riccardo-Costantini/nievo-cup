<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nievo Cup – Pannello Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="shortcut icon" href="assets/images/loghi/favicon_nievo_cup.ico" type="image/x-icon">
</head>
<body class="page-admin">

<div id="bg-fx" aria-hidden="true"></div>

<div class="wrap-admin">
  <header class="admin-hdr-bar">
    <div class="brand">
      <div class="brand-logo-admin">⚽</div>
      <div>
        <div class="brand-name-admin">NIEVO CUP</div>
        <div class="brand-sub-admin">Admin Panel</div>
      </div>
    </div>
    <div class="hdr-badges">
      <div class="fb-badge" id="fb-badge" class="fb-badge-admin">
        <div class="fb-dot" id="fb-dot"></div>
        <span id="fb-lbl">Non connesso</span>
      </div>
      <div class="live-pill-admin">
        <div class="pulse-dot"></div>
        Real-time
      </div>
    </div>
  </header>

  <div class="admin-panel">
    <div class="adm-hdr">
      <div class="adm-ico">🛠️</div>
      <div>
        <div class="adm-title">Gestione Live</div>
        <div class="adm-sub">Nievo Cup · Aggiornamenti istantanei</div>
      </div>
    </div>

    <div class="fg">
      <label class="fl" for="adm-match">📋 SELEZIONA PARTITA</label>
      <select id="adm-match">
        <option value="">— Caricamento in corso —</option>
      </select>
    </div>

    <div class="score-box">
      <div class="sb-match" id="adm-mlbl">⚡ Nessuna partita selezionata</div>
      <div class="sb-score" id="adm-score">0 : 0</div>
      <div class="sb-status" id="adm-stato">–</div>
    </div>

    <div class="fg">
      <label class="fl" for="adm-status">⏱ STATO PARTITA</label>
      <select id="adm-status">
        <option value="In programma">In programma</option>
        <option value="Live">🔴 LIVE</option>
        <option value="Finita">🏁 FINITA</option>
      </select>
    </div>

    <hr class="div" />

    <div class="fg">
      <label class="fl">⚡ SQUADRA MARCATRICE</label>
      <div class="team-tog">
        <button class="tog-btn active" id="btn-h" data-team="home">🏠 Casa</button>
        <button class="tog-btn" id="btn-a" data-team="away">✈️ Trasferta</button>
      </div>
    </div>

    <div class="fg">
      <label class="fl" for="scorer-in">👤 NOME MARCATORE</label>
      <input type="text" id="scorer-in" placeholder="Es. M. Rossi, Autogol" autocomplete="off" />
    </div>

    <button class="btn btn-primary" id="addGoalBtn">⚽ AGGIUNGI GOAL</button>
    <button class="btn btn-amber" id="undoGoalBtn">↩️ ANNULLA ULTIMO GOAL</button>

    <hr class="div" />

    <button class="btn btn-red" id="resetMatchBtn">🔄 RESET PARTITA</button>
    
    <!-- Sezione per creare nuove partite (solo se necessario) -->
    <hr class="div" />
    <div class="adm-sub adm-sub-create">➕ CREA NUOVA PARTITA</div>
    <div class="fg"><input type="text" id="newMatchId" placeholder="ID (es. m61)" /></div>
    <div class="fg"><input type="date" id="newMatchDate" /></div>
    <div class="fg"><input type="text" id="newMatchTime" placeholder="Orario (es. 20:10)" /></div>
    <div class="fg"><input type="text" id="newHomeName" placeholder="Squadra casa" /></div>
    <div class="fg"><input type="text" id="newAwayName" placeholder="Squadra trasferta" /></div>
    <button class="btn btn-primary" id="createMatchBtn">➕ CREA</button>
  </div>

  <footer class="admin-footer">Nievo Cup · Pannello Amministrazione · Firebase Realtime DB</footer>
</div>

<div id="toast" class="admin-toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyB0LUxAWKVUIhXYRb2T2JOT3ypiX9q_5Ck",
    authDomain: "nievo-fcc94.firebaseapp.com",
    databaseURL: "https://nievo-fcc94-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "nievo-fcc94",
    storageBucket: "nievo-fcc94.firebasestorage.app",
    messagingSenderId: "497831212426",
    appId: "1:497831212426:web:357e8c37b249042c53c473",
    measurementId: "G-ZERXCC9LH8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  let db = null;
  let matchesData = {};      // match fissi dal nodo 'matches'
  let resultsData = {};      // risultati dinamici dal nodo 'liveResults'
  let selMatchId = '';
  let selTeam = 'home';

  // Helper
  function toArray(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    if (typeof val === 'object') return Object.values(val);
    return [];
  }

  // Estrae il numero dall'ID (es. "m10" -> 10)
  function extractMatchNumber(id) {
    const match = id.match(/m(\d+)/i);
    return match ? parseInt(match[1], 10) : 0;
  }

  // Ottiene lo stato combinato (match fisso + risultati)
  function getCombinedState(matchId) {
    const match = matchesData[matchId];
    const result = resultsData[matchId] || {};
    return {
      homeName: match?.home?.name || '?',
      awayName: match?.away?.name || '?',
      scorersHome: toArray(result.scorersHome),
      scorersAway: toArray(result.scorersAway),
      status: result.status || 'In programma'
    };
  }

  // Scrive solo i risultati (senza toccare i dettagli del match)
  async function writeResult(matchId, data) {
    if (!db) throw new Error('DB non connesso');
    const resultRef = ref(db, `liveResults/${matchId}`);
    await set(resultRef, { ...data, updatedAt: Date.now() });
  }

  function setConnected(on) {
    const badge = document.getElementById('fb-badge');
    const dot = document.getElementById('fb-dot');
    const lbl = document.getElementById('fb-lbl');
    if (on) {
      badge.classList.add('ok');
      dot.style.background = 'var(--live)';
      lbl.textContent = 'Firebase connesso';
    } else {
      badge.classList.remove('ok');
      dot.style.background = 'var(--text-3)';
      lbl.textContent = 'Non connesso';
    }
  }

  function showToast(msg, type = 'inf') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `admin-toast show t-${type}`;
    setTimeout(() => el.className = 'admin-toast', 3200);
  }

  function updateAdminPreview() {
    if (!selMatchId || !matchesData[selMatchId]) {
      document.getElementById('adm-mlbl').innerHTML = '⚡ Nessuna partita selezionata';
      document.getElementById('adm-score').innerHTML = '— : —';
      document.getElementById('adm-stato').innerHTML = '–';
      return;
    }
    const state = getCombinedState(selMatchId);
    document.getElementById('adm-mlbl').innerHTML = `${state.homeName}  VS  ${state.awayName}`;
    document.getElementById('adm-score').innerHTML = `${state.scorersHome.length} : ${state.scorersAway.length}`;
    document.getElementById('adm-stato').innerHTML = state.status === 'Live' ? '🔴 LIVE' : (state.status === 'Finita' ? '🏁 FINITA' : '⚪ IN PROGRAMMA');
    
    const statusSelect = document.getElementById('adm-status');
    for (let i = 0; i < statusSelect.options.length; i++) {
      if (statusSelect.options[i].value === state.status) {
        statusSelect.selectedIndex = i;
        break;
      }
    }
    // Aggiorna i bottoni squadra con i nomi reali
    document.getElementById('btn-h').innerHTML = `🏠 ${state.homeName}`;
    document.getElementById('btn-a').innerHTML = `✈️ ${state.awayName}`;
  }

  function populateAdminSelect() {
    const sel = document.getElementById('adm-match');
    const matchesArray = Object.values(matchesData);
    if (matchesArray.length === 0) {
      sel.innerHTML = '<option value="">— Nessuna partita —</option>';
      return;
    }
    // Ordina per numero estratto dall'ID (m1, m2, ..., m60)
    matchesArray.sort((a, b) => extractMatchNumber(a.id) - extractMatchNumber(b.id));
    
    sel.innerHTML = '<option value="">— Seleziona partita —</option>';
    matchesArray.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = `${m.id?.toUpperCase()} · ${m.home?.name} vs ${m.away?.name} (${m.date})`;
      sel.appendChild(opt);
    });
    if (selMatchId) sel.value = selMatchId;
  }

  // Listener per i match fissi
  function startMatchesListener() {
    if (!db) return;
    const matchesRef = ref(db, 'matches');
    onValue(matchesRef, (snapshot) => {
      matchesData = snapshot.val() || {};
      populateAdminSelect();
      if (selMatchId && matchesData[selMatchId]) {
        updateAdminPreview();
      } else if (Object.keys(matchesData).length > 0 && !selMatchId) {
        // Seleziona automaticamente il primo match in ordine (m1)
        const sortedIds = Object.keys(matchesData).sort((a,b) => extractMatchNumber(a) - extractMatchNumber(b));
        const firstId = sortedIds[0];
        document.getElementById('adm-match').value = firstId;
        selMatchId = firstId;
        updateAdminPreview();
      }
    }, (err) => {
      console.error('Error reading matches:', err);
      showToast('Errore nel caricamento delle partite', 'err');
    });
  }

  // Listener per i risultati live
  function startResultsListener() {
    if (!db) return;
    const resultsRef = ref(db, 'liveResults');
    onValue(resultsRef, (snapshot) => {
      resultsData = snapshot.val() || {};
      if (selMatchId) updateAdminPreview();
    }, (err) => {
      console.error('Error reading results:', err);
    });
  }

  // Eventi UI
  window.onMatchChange = function() {
    selMatchId = document.getElementById('adm-match').value;
    updateAdminPreview();
  };

  window.pickTeam = function(team) {
    selTeam = team;
    const btnH = document.getElementById('btn-h');
    const btnA = document.getElementById('btn-a');
    if (team === 'home') {
      btnH.classList.add('active');
      btnA.classList.remove('active');
    } else {
      btnA.classList.add('active');
      btnH.classList.remove('active');
    }
  };

  window.addGoal = async function() {
    if (!selMatchId) { showToast('Seleziona una partita', 'err'); return; }
    const scorer = document.getElementById('scorer-in').value.trim();
    if (!scorer) { showToast('Inserisci il nome del marcatore', 'err'); return; }
    
    const state = getCombinedState(selMatchId);
    const scorersHome = [...state.scorersHome];
    const scorersAway = [...state.scorersAway];
    let newStatus = state.status;
    
    if (selTeam === 'home') {
      scorersHome.push(scorer);
    } else {
      scorersAway.push(scorer);
    }
    
    if (newStatus === 'In programma' && (scorersHome.length + scorersAway.length) === 1) {
      newStatus = 'Live';
    }
    
    await writeResult(selMatchId, {
      scorersHome: scorersHome,
      scorersAway: scorersAway,
      status: newStatus
    });
    showToast(`⚽ Goal di ${scorer} aggiunto`, 'ok');
    document.getElementById('scorer-in').value = '';
    document.getElementById('scorer-in').focus();
  };

  window.undoGoal = async function() {
    if (!selMatchId) { showToast('Seleziona una partita', 'err'); return; }
    const state = getCombinedState(selMatchId);
    const scorersHome = [...state.scorersHome];
    const scorersAway = [...state.scorersAway];
    let removed = '';
    
    if (selTeam === 'home' && scorersHome.length > 0) {
      removed = scorersHome.pop();
    } else if (selTeam === 'away' && scorersAway.length > 0) {
      removed = scorersAway.pop();
    } else {
      showToast('Nessun goal da annullare per questa squadra', 'err');
      return;
    }
    
    await writeResult(selMatchId, {
      scorersHome: scorersHome,
      scorersAway: scorersAway,
      status: state.status
    });
    showToast(`↩️ Annullato goal di ${removed}`, 'inf');
  };

  window.saveStatus = async function() {
    if (!selMatchId) { showToast('Seleziona una partita', 'err'); return; }
    const newStatus = document.getElementById('adm-status').value;
    const state = getCombinedState(selMatchId);
    await writeResult(selMatchId, {
      scorersHome: state.scorersHome,
      scorersAway: state.scorersAway,
      status: newStatus
    });
    showToast(`Stato cambiato in ${newStatus}`, 'ok');
  };

  window.resetMatch = async function() {
    if (!selMatchId) { showToast('Seleziona una partita', 'err'); return; }
    if (!confirm('Resettare la partita cancellerà tutti i goal. Continuare?')) return;
    await writeResult(selMatchId, {
      scorersHome: [],
      scorersAway: [],
      status: 'In programma'
    });
    showToast('Partita resettata', 'inf');
  };

  window.createMatch = async function() {
    const id = document.getElementById('newMatchId').value.trim();
    const date = document.getElementById('newMatchDate').value;
    const time = document.getElementById('newMatchTime').value.trim();
    const homeName = document.getElementById('newHomeName').value.trim();
    const awayName = document.getElementById('newAwayName').value.trim();
    if (!id || !date || !time || !homeName || !awayName) {
      showToast('Compila tutti i campi', 'err');
      return;
    }
    if (matchesData[id]) {
      showToast(`Esiste già una partita con ID ${id}`, 'err');
      return;
    }
    const newMatch = {
      id: id,
      date: date,
      time: time,
      home: { name: homeName, emoji: '⚽' },
      away: { name: awayName, emoji: '⚽' },
      round: 'Fase a Gironi',
      group: '' // opzionale
    };
    const matchRef = ref(db, `matches/${id}`);
    await set(matchRef, newMatch);
    // Inizializza anche i risultati vuoti
    await writeResult(id, { scorersHome: [], scorersAway: [], status: 'In programma' });
    showToast(`Partita ${id} creata`, 'ok');
    // pulisci form
    document.getElementById('newMatchId').value = '';
    document.getElementById('newMatchDate').value = '';
    document.getElementById('newMatchTime').value = '';
    document.getElementById('newHomeName').value = '';
    document.getElementById('newAwayName').value = '';
  };

  // Auth e init
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'admin.html';
      return;
    }
    console.log('Admin autenticato:', user.email);
    db = getDatabase(app);
    setConnected(true);
    startMatchesListener();
    startResultsListener();
    // Collega i bottoni
    document.getElementById('addGoalBtn').onclick = () => window.addGoal();
    document.getElementById('undoGoalBtn').onclick = () => window.undoGoal();
    document.getElementById('resetMatchBtn').onclick = () => window.resetMatch();
    document.getElementById('adm-status').onchange = () => window.saveStatus();
    document.getElementById('adm-match').onchange = () => window.onMatchChange();
    document.getElementById('btn-h').onclick = () => window.pickTeam('home');
    document.getElementById('btn-a').onclick = () => window.pickTeam('away');
    document.getElementById('createMatchBtn').onclick = () => window.createMatch();
    showToast('🔥 Connesso a Firebase', 'ok');
  });
</script>
</body>
</html>
