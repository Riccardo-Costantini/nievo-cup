<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nievo Cup – Live Risultati</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ===========================
       CSS VARIABLES (identico al tuo)
    =========================== */
    :root {
      --bg:           #0b0f17;
      --bg-card:      #101621;
      --bg-card2:     #141c2b;
      --bg-input:     #192030;
      --accent:       #7c3aed;
      --accent-h:     #6d28d9;
      --accent-l:     #a78bfa;
      --accent-x:     #c4b5fd;
      --accent-glow:  rgba(124,58,237,0.22);
      --live:         #22c55e;
      --live-bg:      rgba(34,197,94,0.10);
      --live-bdr:     rgba(34,197,94,0.32);
      --text:         #f1f5f9;
      --text-2:       #94a3b8;
      --text-3:       #4b5675;
      --border:       rgba(255,255,255,0.06);
      --border-m:     rgba(255,255,255,0.11);
      --border-a:     rgba(124,58,237,0.32);
      --red:          #ef4444;
      --red-bg:       rgba(239,68,68,0.12);
      --red-bdr:      rgba(239,68,68,0.28);
      --amber:        #f59e0b;
      --amber-bg:     rgba(245,158,11,0.12);
      --amber-bdr:    rgba(245,158,11,0.28);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background FX */
    #bg-fx {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    #bg-fx::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 75% 50% at 50% -5%, rgba(124,58,237,0.20) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 5%  80%, rgba(124,58,237,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 30% 25% at 95% 15%, rgba(168,85,247,0.07) 0%, transparent 55%);
    }
    #bg-fx::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.012) 0px,
          rgba(255,255,255,0.012) 1px,
          transparent 1px,
          transparent 80px
        );
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    header {
      padding: 1.625rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .brand-logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-l) 100%);
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(124,58,237,0.35);
    }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: var(--text);
      line-height: 1;
    }
    .brand-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 0.1rem;
    }

    .hdr-badges {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      flex-wrap: wrap;
    }
    .fb-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.875rem;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--border-m);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      transition: border-color 0.4s, color 0.4s;
    }
    .fb-badge.ok { border-color: var(--live-bdr); color: var(--live); }
    .fb-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      transition: background 0.4s;
      flex-shrink: 0;
    }
    .fb-badge.ok .fb-dot { background: var(--live); }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.875rem;
      border-radius: 999px;
      background: var(--live-bg);
      border: 1px solid var(--live-bdr);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--live);
    }
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.35;transform:scale(.75);} }

    .section-lbl {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.375rem;
    }
    .section-lbl::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .day-group { margin-bottom: 2.25rem; }
    .day-hdr {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.28rem 0.875rem;
      background: rgba(124,58,237,0.10);
      border: 1px solid rgba(124,58,237,0.18);
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-l);
      margin-bottom: 1rem;
    }

    .match-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.375rem 1.125rem;
      margin-bottom: 0.625rem;
      transition: border-color .2s ease, transform .15s ease;
    }
    .match-card:hover { border-color: var(--border-m); transform: translateY(-1px); }
    .match-card.is-live {
      border-color: var(--live-bdr);
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(34,197,94,0.04) 100%);
    }
    .match-card.is-finished { border-color: rgba(124,58,237,0.15); }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.125rem;
    }
    .match-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-2);
    }
    .meta-dot { color: var(--text-3); }

    .badge {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.22rem 0.7rem;
      border-radius: 999px;
    }
    .b-sched  { background: rgba(148,163,184,0.08); color: var(--text-2); border: 1px solid rgba(148,163,184,0.18); }
    .b-live   { background: var(--live-bg); color: var(--live); border: 1px solid var(--live-bdr);
                animation: glow-live 2s ease infinite; }
    .b-fin    { background: rgba(124,58,237,0.12); color: var(--accent-l); border: 1px solid rgba(124,58,237,0.22); }
    @keyframes glow-live {
      0%,100%{box-shadow:0 0 0 rgba(34,197,94,0);}
      50%{box-shadow:0 0 12px rgba(34,197,94,0.22);}
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
    }
    .team-blk { display: flex; flex-direction: column; gap: 0.25rem; }
    .team-blk.away { align-items: flex-end; }

    /* Stile per i loghi delle squadre */
    .team-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 4px;
    }

    .t-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .score-ctr {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.05em;
    }
    .score-n   { font-size: 2.4rem; color: var(--text); line-height: 1; min-width: 1.1em; text-align: center; }
    .score-sep { font-size: 1.8rem; color: var(--text-3); }

    .scorers-wrap {
      margin-top: 1rem;
      padding-top: 0.875rem;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .sc-col { display: flex; flex-direction: column; gap: 0.18rem; }
    .sc-col.right { align-items: flex-end; }

    .sc-item {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      color: var(--text-2);
      font-family: 'Exo 2', sans-serif;
      font-weight: 400;
    }
    .sc-ball { color: var(--accent-l); font-size: 0.65rem; }
    .sc-empty { font-size: 0.68rem; color: var(--text-3); font-style: italic; }

    footer {
      text-align: center;
      padding: 2rem 0 1rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    #toast {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      z-index: 9999;
      pointer-events: none;
      min-width: 220px;
      max-width: 320px;
      padding: 0.875rem 1.125rem;
      border-radius: 12px;
      background: var(--bg-card2);
      border: 1px solid var(--border-m);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.825rem;
      color: var(--text);
      transform: translateY(90px);
      opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.t-err { border-color: var(--red-bdr); }
    #toast.t-inf { border-color: var(--border-a); }

    @media (max-width: 600px) {
      .brand-name { font-size: 1.5rem; }
      .team-logo { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>

<div id="bg-fx" aria-hidden="true"></div>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-logo">⚽</div>
      <div>
        <div class="brand-name">NIEVO CUP</div>
        <div class="brand-sub">Live Match Tracker</div>
      </div>
    </div>
    <div class="hdr-badges">
      <div class="fb-badge" id="fb-badge">
        <div class="fb-dot" id="fb-dot"></div>
        <span id="fb-lbl">Non connesso</span>
      </div>
      <div class="live-pill">
        <div class="pulse-dot"></div>
        Real-time
      </div>
    </div>
  </header>

  <section>
    <div class="section-lbl">⚽ Calendario Partite</div>
    <div id="calendar">
      <p style="color:var(--text-2);font-size:0.85rem;padding:0.5rem 0;">Caricamento in corso…</p>
    </div>
  </section>

  <footer>
    Nievo Cup Live &nbsp;·&nbsp; Firebase Realtime Database &nbsp;·&nbsp; Tutti i diritti riservati
  </footer>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyB0LUxAWKVUIhXYRb2T2JOT3ypiX9q_5Ck",
    authDomain: "nievo-fcc94.firebaseapp.com",
    databaseURL: "https://nievo-fcc94-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "nievo-fcc94",
    storageBucket: "nievo-fcc94.firebasestorage.app",
    messagingSenderId: "497831212426",
    appId: "1:497831212426:web:357e8c37b249042c53c473",
    measurementId: "G-ZERXCC9LH8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let matchesData = {};
  let liveResultsData = {};

  // ------------------------------------------------------------------
  // Mappa i nomi delle squadre (come sono nel DB) ai file PNG
  // ------------------------------------------------------------------
  function getLogoUrl(teamName) {
    if (!teamName) return '';
    // Normalizza: minuscolo, toglie accenti, spazi e trattini diventano underscore
    let slug = teamName.toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_|_$/g, '');
    
    // Eccezioni per nomi che non corrispondono esattamente dopo la normalizzazione
    const exceptions = {
      'bv_smba': 'bv_samba',
      'skoop_poke': 'skoop',
      'spyders_fat_boy': 'spyder_nest',
      'the_pippierate': 'pippierate',
      'hellade_val_borago': 'hellade',
      'under_vr': 'under',
      'fat_boy_campeones': 'fatboy',        // se presente nel DB (ma nei match c'è solo "Campeones")
      'team_santa_follia': 'team_santa_follia',
      'san_mexico': 'san_mexico'
    };
    if (exceptions[slug]) slug = exceptions[slug];
    
    // Percorso relativo alla root del sito (funziona sia su GitHub Pages che in locale)
    return `assets/images/loghi_squadre/${slug}.png`;
  }

  function toArray(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    if (typeof val === 'object') return Object.values(val);
    return [];
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function fmtDate(dateStr) {
    if (!dateStr) return 'Data non specificata';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('it-IT', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function sortMatchesByDateTime(matchesArray) {
    return [...matchesArray].sort((a, b) => {
      const dateCompare = (a.date || '').localeCompare(b.date || '');
      if (dateCompare !== 0) return dateCompare;
      const timeA = a.time || '00:00';
      const timeB = b.time || '00:00';
      return timeA.localeCompare(timeB);
    });
  }

  function renderCalendar() {
    const container = document.getElementById('calendar');
    const matchesArray = Object.values(matchesData);
    
    if (matchesArray.length === 0) {
      container.innerHTML = `<p style="color:var(--text-2);font-size:0.85rem;padding:0.5rem 0;">Nessuna partita disponibile nel database.</p>`;
      return;
    }

    const grouped = {};
    for (const match of matchesArray) {
      const date = match.date || '2025-01-01';
      if (!grouped[date]) grouped[date] = [];
      grouped[date].push(match);
    }

    let html = '';
    const sortedDates = Object.keys(grouped).sort();
    for (const date of sortedDates) {
      const matchesOnDate = grouped[date];
      const sortedMatches = sortMatchesByDateTime(matchesOnDate);
      const round = sortedMatches[0]?.round || '';
      html += `<div class="day-group"><div class="day-hdr">📅 ${fmtDate(date)} &nbsp;·&nbsp; ${esc(round)}</div>`;
      for (const match of sortedMatches) {
        const result = liveResultsData[match.id] || {};
        const scorersHome = toArray(result.scorersHome);
        const scorersAway = toArray(result.scorersAway);
        const status = result.status || 'In programma';
        const cls = status === 'Live' ? ' is-live' : (status === 'Finita' ? ' is-finished' : '');
        const badgeHtml = status === 'Live' ? '<span class="badge b-live">● LIVE</span>'
                         : status === 'Finita' ? '<span class="badge b-fin">✔ Finita</span>'
                         : '<span class="badge b-sched">In programma</span>';
        
        const hList = scorersHome.length
          ? scorersHome.map(s => `<div class="sc-item"><span class="sc-ball">⚽</span>${esc(s)}</div>`).join('')
          : '<div class="sc-empty">—</div>';
        const aList = scorersAway.length
          ? scorersAway.map(s => `<div class="sc-item">${esc(s)}<span class="sc-ball" style="margin-left:.25rem">⚽</span></div>`).join('')
          : '<div class="sc-empty">—</div>';

        html += `
          <div class="match-card${cls}">
            <div class="card-top">
              <div class="match-meta">
                <span>⏱ ${esc(match.time || '--:--')}</span>
                <span class="meta-dot">·</span>
                <span>${esc(match.id?.toUpperCase() || '?')}</span>
              </div>
              ${badgeHtml}
            </div>
            <div class="score-row">
              <div class="team-blk">
                <img class="team-logo" src="${getLogoUrl(match.home?.name)}" alt="${esc(match.home?.name)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling?.style?.setProperty('display', 'block');" />
                <div class="t-name">${esc(match.home?.name || 'Casa')}</div>
              </div>
              <div class="score-ctr">
                <span class="score-n">${scorersHome.length}</span>
                <span class="score-sep">:</span>
                <span class="score-n">${scorersAway.length}</span>
              </div>
              <div class="team-blk away">
                <img class="team-logo" src="${getLogoUrl(match.away?.name)}" alt="${esc(match.away?.name)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling?.style?.setProperty('display', 'block');" />
                <div class="t-name">${esc(match.away?.name || 'Trasferta')}</div>
              </div>
            </div>
            <div class="scorers-wrap">
              <div class="sc-col">${hList}</div>
              <div class="sc-col right">${aList}</div>
            </div>
          </div>
        `;
      }
      html += `</div>`;
    }
    container.innerHTML = html;
  }

  function setConnected(ok) {
    const badge = document.getElementById('fb-badge');
    const dot = document.getElementById('fb-dot');
    const lbl = document.getElementById('fb-lbl');
    if (ok) {
      badge.classList.add('ok');
      dot.style.background = 'var(--live)';
      lbl.textContent = 'Firebase connesso';
    } else {
      badge.classList.remove('ok');
      dot.style.background = 'var(--text-3)';
      lbl.textContent = 'Non connesso';
    }
  }

  let toastTimer = null;
  function showToast(msg, type = 'inf') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show t-${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3200);
  }

  // Ascolta i match fissi
  onValue(ref(db, 'matches'), (snapshot) => {
    matchesData = snapshot.val() || {};
    renderCalendar();
    setConnected(true);
    showToast('🔥 Dati aggiornati in tempo reale', 'inf');
  }, (error) => {
    console.error('Errore lettura matches:', error);
    setConnected(false);
    showToast('Errore di connessione a Firebase', 'err');
    document.getElementById('calendar').innerHTML = `<p style="color:var(--text-2);font-size:0.85rem;padding:0.5rem 0;">Impossibile caricare le partite.</p>`;
  });

  // Ascolta i risultati live
  onValue(ref(db, 'liveResults'), (snapshot) => {
    liveResultsData = snapshot.val() || {};
    renderCalendar();
  }, (error) => {
    console.error('Errore lettura liveResults:', error);
  });
</script>
</body>
</html>
