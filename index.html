<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nievo Cup – Live Risultati</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ===========================
       CSS VARIABLES
    =========================== */
    :root {
      --bg:           #0b0f17;
      --bg-card:      #101621;
      --bg-card2:     #141c2b;
      --bg-input:     #192030;
      --accent:       #7c3aed;
      --accent-h:     #6d28d9;
      --accent-l:     #a78bfa;
      --accent-x:     #c4b5fd;
      --accent-glow:  rgba(124,58,237,0.22);
      --live:         #22c55e;
      --live-bg:      rgba(34,197,94,0.10);
      --live-bdr:     rgba(34,197,94,0.32);
      --text:         #f1f5f9;
      --text-2:       #94a3b8;
      --text-3:       #4b5675;
      --border:       rgba(255,255,255,0.06);
      --border-m:     rgba(255,255,255,0.11);
      --border-a:     rgba(124,58,237,0.32);
      --red:          #ef4444;
      --red-bg:       rgba(239,68,68,0.12);
      --red-bdr:      rgba(239,68,68,0.28);
      --amber:        #f59e0b;
      --amber-bg:     rgba(245,158,11,0.12);
      --amber-bdr:    rgba(245,158,11,0.28);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background FX */
    #bg-fx {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    #bg-fx::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 75% 50% at 50% -5%, rgba(124,58,237,0.20) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 5%  80%, rgba(124,58,237,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 30% 25% at 95% 15%, rgba(168,85,247,0.07) 0%, transparent 55%);
    }
    #bg-fx::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.012) 0px,
          rgba(255,255,255,0.012) 1px,
          transparent 1px,
          transparent 80px
        );
    }

    /* Layout */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* Header */
    header {
      padding: 1.625rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .brand-logo {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-l) 100%);
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(124,58,237,0.35);
    }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: var(--text);
      line-height: 1;
    }
    .brand-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 0.1rem;
    }

    .hdr-badges {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      flex-wrap: wrap;
    }
    .fb-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.875rem;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--border-m);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      transition: border-color 0.4s, color 0.4s;
    }
    .fb-badge.ok { border-color: var(--live-bdr); color: var(--live); }
    .fb-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      transition: background 0.4s;
      flex-shrink: 0;
    }
    .fb-badge.ok .fb-dot { background: var(--live); }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.875rem;
      border-radius: 999px;
      background: var(--live-bg);
      border: 1px solid var(--live-bdr);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--live);
    }
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.35;transform:scale(.75);} }

    /* Calendar */
    .section-lbl {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.375rem;
    }
    .section-lbl::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .day-group { margin-bottom: 2.25rem; }
    .day-hdr {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.28rem 0.875rem;
      background: rgba(124,58,237,0.10);
      border: 1px solid rgba(124,58,237,0.18);
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-l);
      margin-bottom: 1rem;
    }

    .match-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.375rem 1.125rem;
      margin-bottom: 0.625rem;
      transition: border-color .2s ease, transform .15s ease;
    }
    .match-card:hover { border-color: var(--border-m); transform: translateY(-1px); }
    .match-card.is-live {
      border-color: var(--live-bdr);
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(34,197,94,0.04) 100%);
    }
    .match-card.is-finished { border-color: rgba(124,58,237,0.15); }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.125rem;
    }
    .match-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-2);
    }
    .meta-dot { color: var(--text-3); }

    .badge {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.22rem 0.7rem;
      border-radius: 999px;
    }
    .b-sched  { background: rgba(148,163,184,0.08); color: var(--text-2); border: 1px solid rgba(148,163,184,0.18); }
    .b-live   { background: var(--live-bg); color: var(--live); border: 1px solid var(--live-bdr);
                animation: glow-live 2s ease infinite; }
    .b-fin    { background: rgba(124,58,237,0.12); color: var(--accent-l); border: 1px solid rgba(124,58,237,0.22); }
    @keyframes glow-live {
      0%,100%{box-shadow:0 0 0 rgba(34,197,94,0);}
      50%{box-shadow:0 0 12px rgba(34,197,94,0.22);}
    }

    .score-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
    }
    .team-blk { display: flex; flex-direction: column; gap: 0.25rem; }
    .team-blk.away { align-items: flex-end; }

    .t-emoji  { font-size: 1.75rem; line-height: 1; }
    .t-name   {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .score-ctr {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.05em;
    }
    .score-n   { font-size: 2.4rem; color: var(--text); line-height: 1; min-width: 1.1em; text-align: center; }
    .score-sep { font-size: 1.8rem; color: var(--text-3); }

    .scorers-wrap {
      margin-top: 1rem;
      padding-top: 0.875rem;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .sc-col { display: flex; flex-direction: column; gap: 0.18rem; }
    .sc-col.right { align-items: flex-end; }

    .sc-item {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      color: var(--text-2);
      font-family: 'Exo 2', sans-serif;
      font-weight: 400;
    }
    .sc-ball { color: var(--accent-l); font-size: 0.65rem; }
    .sc-empty { font-size: 0.68rem; color: var(--text-3); font-style: italic; }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem 0 1rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    /* Toast (solo per errori) */
    #toast {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      z-index: 9999;
      pointer-events: none;
      min-width: 220px;
      max-width: 320px;
      padding: 0.875rem 1.125rem;
      border-radius: 12px;
      background: var(--bg-card2);
      border: 1px solid var(--border-m);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.825rem;
      color: var(--text);
      transform: translateY(90px);
      opacity: 0;
      transition: transform .3s ease, opacity .3s ease;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.t-err { border-color: var(--red-bdr); }
    #toast.t-inf { border-color: var(--border-a); }

    @media (max-width: 600px) {
      .brand-name { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div id="bg-fx" aria-hidden="true"></div>

<div class="wrap">
  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-logo">⚽</div>
      <div>
        <div class="brand-name">NIEVO CUP</div>
        <div class="brand-sub">Live Match Tracker</div>
      </div>
    </div>
    <div class="hdr-badges">
      <div class="fb-badge" id="fb-badge">
        <div class="fb-dot" id="fb-dot"></div>
        <span id="fb-lbl">Non connesso</span>
      </div>
      <div class="live-pill">
        <div class="pulse-dot"></div>
        Real-time
      </div>
    </div>
  </header>

  <!-- CALENDARIO PUBBLICO -->
  <section>
    <div class="section-lbl">⚽ Calendario Partite</div>
    <div id="calendar">
      <p style="color:var(--text-2);font-size:0.85rem;padding:0.5rem 0;">
        Caricamento in corso…
      </p>
    </div>
  </section>

  <footer>
    Nievo Cup Live &nbsp;·&nbsp; Firebase Realtime Database &nbsp;·&nbsp; Tutti i diritti riservati
  </footer>
</div>

<!-- Toast notification (solo per errori Firebase) -->
<div id="toast"></div>

<!-- =======================================
     JAVASCRIPT (solo pubblico, nessun admin)
======================================= -->
<script type="module">

// ─────────────────────────────────────────
// MATCH DEFINITIONS
// ─────────────────────────────────────────
const MATCHES = [
  { id:'m1', round:'Giornata 1', home:{ name:'Aquile Nere',  emoji:'🦅' }, away:{ name:'Falchi Rossi', emoji:'🔴' }, date:'2025-06-05', time:'17:00' },
  { id:'m2', round:'Giornata 1', home:{ name:'Lupi Grigi',   emoji:'🐺' }, away:{ name:'Tigri Dorate', emoji:'🐯' }, date:'2025-06-05', time:'19:30' },
  { id:'m3', round:'Giornata 2', home:{ name:'Aquile Nere',  emoji:'🦅' }, away:{ name:'Lupi Grigi',   emoji:'🐺' }, date:'2025-06-07', time:'16:00' },
  { id:'m4', round:'Giornata 2', home:{ name:'Falchi Rossi', emoji:'🔴' }, away:{ name:'Tigri Dorate', emoji:'🐯' }, date:'2025-06-07', time:'18:30' },
  { id:'m5', round:'Giornata 3', home:{ name:'Tigri Dorate', emoji:'🐯' }, away:{ name:'Aquile Nere',  emoji:'🦅' }, date:'2025-06-09', time:'17:30' },
  { id:'m6', round:'Giornata 3', home:{ name:'Falchi Rossi', emoji:'🔴' }, away:{ name:'Lupi Grigi',   emoji:'🐺' }, date:'2025-06-09', time:'20:00' },
  { id:'m7', round:'Semifinali', home:{ name:'Semi 1A', emoji:'⚔️' }, away:{ name:'Semi 1B', emoji:'⚔️' }, date:'2025-06-12', time:'18:00' },
  { id:'m8', round:'Semifinali', home:{ name:'Semi 2A', emoji:'⚔️' }, away:{ name:'Semi 2B', emoji:'⚔️' }, date:'2025-06-12', time:'20:30' },
  { id:'m9', round:'🏆 Finale',  home:{ name:'Finalista 1', emoji:'🏆' }, away:{ name:'Finalista 2', emoji:'🏆' }, date:'2025-06-14', time:'20:00' },
];

let db       = null;
let liveData = {};

// Firebase imports
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyB0LUxAWKVUIhXYRb2T2JOT3ypiX9q_5Ck",
  authDomain: "nievo-fcc94.firebaseapp.com",
  projectId: "nievo-fcc94",
  storageBucket: "nievo-fcc94.firebasestorage.app",
  messagingSenderId: "497831212426",
  appId: "1:497831212426:web:357e8c37b249042c53c473",
  measurementId: "G-ZERXCC9LH8",
  databaseURL: "https://nievo-fcc94-default-rtdb.europe-west1.firebasedatabase.app/"
};

// Connessione badge
function setConnected (on) {
  const badge = document.getElementById('fb-badge');
  const dot   = document.getElementById('fb-dot');
  const lbl   = document.getElementById('fb-lbl');
  if (on) {
    badge.classList.add('ok');
    dot.style.background = 'var(--live)';
    lbl.textContent = 'Firebase connesso';
  } else {
    badge.classList.remove('ok');
    dot.style.background = 'var(--text-3)';
    lbl.textContent = 'Non connesso';
  }
}

// Listener realtime
function startListener () {
  if (!db) return;
  const rootRef = ref(db, 'nievoCupDemo/results');
  onValue(rootRef, (snap) => {
    liveData = snap.val() || {};
    renderCalendar();
  }, (err) => {
    showToast('Errore Firebase: ' + err.message, 'err');
    console.error(err);
  });
}

// Helpers
function getState (id) {
  const d = liveData[id];
  if (!d) return { scorersHome: [], scorersAway: [], status: 'In programma' };
  const scorersHome = toArray(d.scorersHome);
  const scorersAway = toArray(d.scorersAway);
  return { scorersHome, scorersAway, status: d.status || 'In programma' };
}

function toArray (val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  if (typeof val === 'object') return Object.values(val);
  return [];
}

// Rendering calendario
function renderCalendar () {
  const cal = document.getElementById('calendar');
  const grouped = {};
  for (const m of MATCHES) {
    if (!grouped[m.date]) grouped[m.date] = [];
    grouped[m.date].push(m);
  }

  let html = '';
  for (const date of Object.keys(grouped).sort()) {
    const ms = grouped[date];
    const round = ms[0].round;
    html += `
      <div class="day-group">
        <div class="day-hdr">📅 ${fmtDate(date)} &nbsp;·&nbsp; ${round}</div>
        ${ms.map(renderCard).join('')}
      </div>`;
  }
  cal.innerHTML = html;
}

function renderCard (m) {
  const st   = getState(m.id);
  const sh   = st.scorersHome.length;
  const sa   = st.scorersAway.length;
  const cls  = st.status === 'Live'   ? ' is-live'
             : st.status === 'Finita' ? ' is-finished' : '';

  const badgeHtml =
    st.status === 'Live'   ? '<span class="badge b-live">● LIVE</span>'
  : st.status === 'Finita' ? '<span class="badge b-fin">✔ Finita</span>'
  :                          '<span class="badge b-sched">In programma</span>';

  const hList = st.scorersHome.length
    ? st.scorersHome.map(s => `<div class="sc-item"><span class="sc-ball">⚽</span>${esc(s)}</div>`).join('')
    : '<div class="sc-empty">—</div>';

  const aList = st.scorersAway.length
    ? st.scorersAway.map(s => `<div class="sc-item">${esc(s)}<span class="sc-ball" style="margin-left:.25rem">⚽</span></div>`).join('')
    : '<div class="sc-empty">—</div>';

  return `
    <div class="match-card${cls}">
      <div class="card-top">
        <div class="match-meta">
          <span>⏱ ${m.time}</span>
          <span class="meta-dot">·</span>
          <span>${m.id.toUpperCase()}</span>
        </div>
        ${badgeHtml}
      </div>

      <div class="score-row">
        <div class="team-blk">
          <div class="t-emoji">${m.home.emoji}</div>
          <div class="t-name">${m.home.name}</div>
        </div>
        <div class="score-ctr">
          <span class="score-n">${sh}</span>
          <span class="score-sep">:</span>
          <span class="score-n">${sa}</span>
        </div>
        <div class="team-blk away">
          <div class="t-emoji">${m.away.emoji}</div>
          <div class="t-name">${m.away.name}</div>
        </div>
      </div>

      <div class="scorers-wrap">
        <div class="sc-col">${hList}</div>
        <div class="sc-col right">${aList}</div>
      </div>
    </div>`;
}

// Utilities
function esc (s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate (str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('it-IT', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

// Toast (solo per errori)
let toastTimer = null;
function showToast (msg, type = 'inf') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `show t-${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3200);
}

// Avvio automatico
(function initFirebase() {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
  setConnected(true);
  startListener();
  showToast('🔥 Connesso in tempo reale', 'inf');
})();

</script>
</body>
</html>
