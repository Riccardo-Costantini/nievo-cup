<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nievo Cup</title>

  <!-- Google tag (se già presente nel sito puoi anche rimuoverlo da qui) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LNX14N1XMB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-LNX14N1XMB');
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0b0b;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .box {
      padding: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
    }

    .loader {
      margin: 20px auto 0;
      width: 30px;
      height: 30px;
      border: 3px solid #333;
      border-top: 3px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="title">Nievo Cup</div>
    <div class="subtitle">Reindirizzamento in corso...</div>
    <div class="loader"></div>
  </div>

  <script>
    // destinazione finale (CAMBIA QUI SE VUOI)
    const targetURL = "https://nievocup.it/?utm_source=qr&utm_medium=offline&utm_campaign=spalti";

    // evento analytics (se disponibile)
    try {
      gtag('event', 'qr_scan', {
        event_category: 'engagement',
        event_label: 'spalti'
      });
    } catch (e) {}

    // piccolo delay per far registrare l'evento
    setTimeout(() => {
      window.location.href = targetURL;
    }, 1000);
  </script>
</body>
</html>
