<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="theme-color" content="#000000">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0f17">
  <title>Nievo Cup – Calendario Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css"></head>
  <link rel="shortcut icon" href="assets/images/loghi/favicon_nievo_cup.ico" type="image/x-icon">

  <body class="page-calendario">

  <div class="header">
    <div class="logo">
      <a href="index.html">
        <img src="assets/images/loghi/logo_nievo_white.png" alt="Logo Nievo Cup">
      </a>
    </div>
    <div class="menu">
      <div class="voce">
        <a href="calendario.html"><p>Calendario</p></a>
      </div>
      <div class="voce">
        <a href="gironi.html"><p>Gironi</p></a>
      </div>
      <div class="voce">
        <p>Tabellone</p>
      </div>
      <div class="voce">
        <p>Squadre</p>
      </div>
    </div>
  </div>

  <div id="bg-fx" aria-hidden="true"></div>
  
<div class="wrap">
  <section>
    <div id="calendar">
      <p class="cal-loading">Caricamento in corso…</p>
    </div>
  </section>

  <footer>
    Nievo Cup Live &nbsp;·&nbsp; Firebase Realtime Database &nbsp;·&nbsp; Tutti i diritti riservati
  </footer>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyB0LUxAWKVUIhXYRb2T2JOT3ypiX9q_5Ck",
    authDomain: "nievo-fcc94.firebaseapp.com",
    databaseURL: "https://nievo-fcc94-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "nievo-fcc94",
    storageBucket: "nievo-fcc94.firebasestorage.app",
    messagingSenderId: "497831212426",
    appId: "1:497831212426:web:357e8c37b249042c53c473",
    measurementId: "G-ZERXCC9LH8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let matchesData = {};
  let liveResultsData = {};

  // Mappa nomi squadre -> file png
  function getLogoUrl(teamName) {
    if (!teamName) return '';
    let slug = teamName.toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_|_$/g, '');
    
    const exceptions = {
      'bv_smba': 'bv_samba',
      'skoop_poke': 'skoop',
      'fat_boy': 'fatboy',
      'the_pippierate': 'pippierate',
      'hellade_val_borago': 'hellade',
      'under_vr': 'under',
      'team_santa_follia': 'team_santa_follia',
      'san_mexico': 'san_mexico'
    };
    if (exceptions[slug]) slug = exceptions[slug];
    return `assets/images/loghi_squadre/${slug}.png`;
  }

  function toArray(val) {
    if (!val) return [];
    if (Array.isArray(val)) return val;
    if (typeof val === 'object') return Object.values(val);
    return [];
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function fmtDate(dateStr) {
    if (!dateStr) return 'Data non specificata';
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('it-IT', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function sortMatchesByDateTime(matchesArray) {
    return [...matchesArray].sort((a, b) => {
      const dateCompare = (a.date || '').localeCompare(b.date || '');
      if (dateCompare !== 0) return dateCompare;
      const timeA = a.time || '00:00';
      const timeB = b.time || '00:00';
      return timeA.localeCompare(timeB);
    });
  }

  function renderCalendar() {
    const container = document.getElementById('calendar');
    const matchesArray = Object.values(matchesData);
    
    if (matchesArray.length === 0) {
      container.innerHTML = `<p class="cal-loading">Nessuna partita disponibile nel database.</p>`;
      return;
    }

    const grouped = {};
    for (const match of matchesArray) {
      const date = match.date || '2025-01-01';
      if (!grouped[date]) grouped[date] = [];
      grouped[date].push(match);
    }

    let html = '';
    const sortedDates = Object.keys(grouped).sort();
    for (const date of sortedDates) {
      const matchesOnDate = grouped[date];
      const sortedMatches = sortMatchesByDateTime(matchesOnDate);
      const round = sortedMatches[0]?.round || '';
      html += `<div class="day-group"><div class="day-hdr">📅 ${fmtDate(date)} &nbsp;·&nbsp; ${esc(round)}</div>`;
      for (const match of sortedMatches) {
        const result = liveResultsData[match.id] || {};
        const scorersHome = toArray(result.scorersHome);
        const scorersAway = toArray(result.scorersAway);
        const status = result.status || 'In programma';
        const cls = status === 'Live' ? ' is-live' : (status === 'Finita' ? ' is-finished' : '');
        const badgeHtml = status === 'Live' ? '<span class="badge b-live">● LIVE</span>'
                         : status === 'Finita' ? '<span class="badge b-fin">✔ Finita</span>'
                         : '<span class="badge b-sched">In programma</span>';
        
        const hList = scorersHome.length
          ? scorersHome.map(s => `<div class="sc-item"><span class="sc-ball">⚽</span>${esc(s)}</div>`).join('')
          : '<div class="sc-empty">—</div>';
        const aList = scorersAway.length
          ? scorersAway.map(s => `<div class="sc-item">${esc(s)}<span class="sc-ball sc-ball-away">⚽</span></div>`).join('')
          : '<div class="sc-empty">—</div>';

        html += `
          <div class="match-card${cls}" data-match-id="${match.id}">
            <div class="card-top">
              <div class="match-meta">
                <span>⏱ ${esc(match.time || '--:--')}</span>
                <span class="meta-dot">·</span>
                <span>${esc(match.id?.toUpperCase() || '?')}</span>
              </div>
              ${badgeHtml}
            </div>
            <div class="score-row">
              <div class="team-blk">
                <img class="team-logo" src="${getLogoUrl(match.home?.name)}" alt="${esc(match.home?.name)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling?.style?.setProperty('display', 'block');" />
                <div class="t-name">${esc(match.home?.name || 'Casa')}</div>
              </div>
              <div class="score-ctr">
                <span class="score-n">${scorersHome.length}</span>
                <span class="score-sep">:</span>
                <span class="score-n">${scorersAway.length}</span>
              </div>
              <div class="team-blk away">
                <img class="team-logo" src="${getLogoUrl(match.away?.name)}" alt="${esc(match.away?.name)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling?.style?.setProperty('display', 'block');" />
                <div class="t-name">${esc(match.away?.name || 'Trasferta')}</div>
              </div>
            </div>
            <div class="scorers-wrap">
              <div class="sc-col">${hList}</div>
              <div class="sc-col right">${aList}</div>
            </div>
          </div>
        `;
      }
      html += `</div>`;
    }
    container.innerHTML = html;
  }


  // Listener match fissi
  onValue(ref(db, 'matches'), (snapshot) => {
    matchesData = snapshot.val() || {};
    renderCalendar();
  }, (error) => {
    console.error('Errore lettura matches:', error);
    setConnected(false);
    document.getElementById('calendar').innerHTML = `<p class="cal-loading">Impossibile caricare le partite.</p>`;
  });

  // Listener risultati live
  onValue(ref(db, 'liveResults'), (snapshot) => {
    liveResultsData = snapshot.val() || {};
    renderCalendar();
  }, (error) => {
    console.error('Errore lettura liveResults:', error);
  });
</script>
</body>
</html>
